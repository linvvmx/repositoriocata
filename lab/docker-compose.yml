services:
  # =========================
  # DVWA - Aplicación vulnerable
  # =========================
  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa
    restart: unless-stopped
    ports:
      - "8080:80"
    deploy:
      resources:
        limits:
          cpus: '0.50'     # Limita al 50% de un núcleo de CPU
          memory: 128M     # Limita la memoria RAM a 128 Megabytes

  # =========================
  # Juice Shop
  # =========================
  juice-shop:
    image: bkimminich/juice-shop
    container_name: juice-shop
    restart: unless-stopped
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '0.50'     # Limita al 50% de un núcleo de CPU
          memory: 128M     # Limita la memoria RAM a 128 Megabytes

  # =========================
  # SSH vulnerable para Hydra
  # =========================
  ssh-lab:
    image: linuxserver/openssh-server
    container_name: ssh-lab
    restart: unless-stopped
    environment:
      - USER_NAME=pentester
      - USER_PASSWORD=pentester
      - PASSWORD_ACCESS=true
    ports:
      - "2222:2222"
    deploy:
      resources:
        limits:
          cpus: '0.50'     # Limita al 50% de un núcleo de CPU
          memory: 128M     # Limita la memoria RAM a 128 Megabytes

  # =========================
  # Apache con directorios ocultos
  # =========================
  web-lab:
    image: nginx:alpine
    container_name: web-lab
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    deploy:
      resources:
        limits:
          cpus: '0.50'     # Limita al 50% de un núcleo de CPU
          memory: 128M     # Limita la memoria RAM a 128 Megabytes

  # =========================
  # Contenedor atacante
  # =========================
  attacker:
    image: kalilinux/kali-rolling
    container_name: attacker
    stdin_open: true
    tty: true
    command: /bin/bash